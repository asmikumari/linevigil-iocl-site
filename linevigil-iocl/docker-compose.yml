version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: linevigil
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      DATABASE_URL: postgres://postgres:password123@db:5432/linevigil
      MONGODB_URI: mongodb://mongodb:27017/linevigil
      JWT_SECRET: supersecretkey123
    depends_on:
      - db
      - mongodb

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pg-data:
  mongo-data:
